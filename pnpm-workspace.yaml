packages:
  - 'packages/core-server'
  - 'packages/core-web'
  - 'packages/shared-types'
  - 'packages/plugins/*'
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  core-js: true
  esbuild: true
  prisma: true
onlyBuiltDependencies: prisma @prisma/client @prisma/engines esbuild @nestjs/core
