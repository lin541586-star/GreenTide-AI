services:
  - type: web
    name: greentide-api
    runtime: node
    repo: https://github.com/lin541586-star/GreenTide-AI
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm db:generate && pnpm build:server && pnpm build:web
    startCommand: node packages/core-server/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: greentide-db
          property: connectionString
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-chat

databases:
  - name: greentide-db
    plan: free
    databaseType: postgresql
    ipAllowList: []
